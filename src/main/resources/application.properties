# ============================================================
# Hornet Imports — application.properties
# Todos los secretos se leen de variables de entorno (${VAR})
# Copiar .env.example a .env y completar los valores locales
# ============================================================

# --- Servidor ---
server.port=${PORT:8080}

# --- Base de datos ---
# En Railway/prod usar SPRING_DATASOURCE_URL=jdbc:postgresql://...
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hornet_imports}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=2592000000

# --- Google OAuth ---
google.client-id=${GOOGLE_CLIENT_ID}

# --- Email (Resend via SMTP) ---
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
email.from=${EMAIL_FROM}
email.admin=${EMAIL_ADMIN}

# --- Mercado Pago ---
mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.webhook-secret=${MP_WEBHOOK_SECRET}

# --- Cloudinary ---
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.upload-preset=hornet_listings

# --- Pagos manuales ---
cripto.usdt.red=TRC-20 (TRON)
cripto.usdt.direccion=${USDT_WALLET_ADDRESS}
transferencia.cbu=${TRANSFERENCIA_CBU}
transferencia.alias=${TRANSFERENCIA_ALIAS}
transferencia.banco=${TRANSFERENCIA_BANCO}
transferencia.titular=${TRANSFERENCIA_TITULAR}

# --- App ---
app.base-url=${APP_BASE_URL}
app.frontend-url=${FRONTEND_URL}

# --- Scheduling (crons) ---
spring.task.scheduling.enabled=true
